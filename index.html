<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shivika Rohilla Chess Academy | India's Premier Chess Training</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      /* Prevent horizontal scroll issues */
      html, body {
        background: #000000;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        color: #ffffff;
      }

      /* ── Subtle: nav, chips, stat cards (Refined Claymorphism) ── */
      .liquid-glass {
        background: rgba(255, 255, 255, 0.035);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08) !important;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4),
                    inset 0 3px 5px rgba(255, 255, 255, 0.12),
                    inset 0 -3px 5px rgba(0, 0, 0, 0.45) !important;
        position: relative;
        overflow: hidden;
      }

      /* ── Strong: primary CTA button & High-Contrast Boxes (3D Claymorphic) ── */
      .liquid-glass-strong {
        background: rgba(255, 255, 255, 0.065);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.14) !important;
        box-shadow: 0 16px 32px rgba(0, 0, 0, 0.5),
                    inset 0 4px 6px rgba(255, 255, 255, 0.22),
                    inset 0 -4px 6px rgba(0, 0, 0, 0.55) !important;
        position: relative;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
